services:
  db:
    image: postgres:16-alpine
    container_name: incidentiq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incidentiq
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incidentiq"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: incidentiq-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/incidentiq?schema=public"
      PORT: 4000
      NODE_ENV: production
      CLIENT_ORIGIN: "http://localhost:5173"
      JWT_ACCESS_SECRET: "docker-access-secret-change-me"
      JWT_REFRESH_SECRET: "docker-refresh-secret-change-me"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
    ports:
      - "4000:4000"
    # Apply migrations (and seed on first run), then start the compiled API.
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts && node dist/server.js"

  frontend:
    build: ./frontend
    container_name: incidentiq-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
